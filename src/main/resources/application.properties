server.port=9000

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_schema=bank
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

app.security.basic.username=${BASIC_AUTH_USERNAME:workintech}
app.security.basic.password=${BASIC_AUTH_PASSWORD:workintech123}
app.security.basic.authority=${BASIC_AUTH_AUTHORITY:ADMIN}

spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID:replace-me}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET:replace-me}
spring.security.oauth2.client.registration.github.scope=read:user,user:email
